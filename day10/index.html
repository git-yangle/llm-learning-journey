<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Day 10 — SSE 流式对话测试</title>
  <style>
    body { font-family: monospace; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #0d1117; color: #c9d1d9; }
    h2 { color: #58a6ff; }
    textarea { width: 100%; box-sizing: border-box; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 8px; font-size: 14px; resize: vertical; }
    button { margin-top: 8px; padding: 8px 20px; background: #238636; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:disabled { background: #21262d; cursor: not-allowed; }
    #output { margin-top: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; min-height: 120px; white-space: pre-wrap; line-height: 1.6; }
    .label { color: #8b949e; font-size: 12px; margin-bottom: 6px; }
    #status { font-size: 12px; color: #8b949e; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>Day 10 — SSE 流式对话</h2>

  <div class="label">会话 ID（可随意填写）</div>
  <input id="session" type="text" value="test-001"
    style="background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 8px;width:200px;" />

  <div class="label" style="margin-top:14px;">输入消息</div>
  <textarea id="msg" rows="3" placeholder="输入你的问题…">用一句话解释什么是 SSE</textarea>

  <br />
  <button id="btn" onclick="sendStream()">发送（SSE 流式）</button>
  <button onclick="sendNormal()" style="margin-left:8px;background:#1f6feb;">发送（普通接口对照）</button>
  <button onclick="clearSession()" style="margin-left:8px;background:#6e7681;">清除会话</button>

  <div id="status">等待发送…</div>

  <div class="label" style="margin-top:16px;">回复</div>
  <div id="output"></div>

  <script>
    const BASE = "http://127.0.0.1:8000";

    // ─────────────────────────────────────────
    // SSE 流式发送（核心）
    // 使用浏览器原生 EventSource API
    // ─────────────────────────────────────────
    function sendStream() {
      const sessionId = document.getElementById("session").value.trim();
      const message   = document.getElementById("msg").value.trim();
      if (!message) return;

      const output = document.getElementById("output");
      const btn    = document.getElementById("btn");
      const status = document.getElementById("status");

      output.textContent = "";
      btn.disabled = true;
      status.textContent = "连接中…";

      // EventSource 只支持 GET，参数拼在 URL 里
      const url = `${BASE}/chat/stream?session_id=${encodeURIComponent(sessionId)}&message=${encodeURIComponent(message)}`;

      // 创建 SSE 连接（浏览器自动处理重连、心跳）
      const es = new EventSource(url);

      es.onopen = () => {
        status.textContent = "已连接，接收中…";
      };

      // 默认监听 message 事件（即服务端发送的 "data: xxx" 行）
      es.onmessage = (event) => {
        if (event.data === "[DONE]") {
          // 收到结束信号，关闭连接
          es.close();
          btn.disabled = false;
          status.textContent = "完成";
          return;
        }

        try {
          const payload = JSON.parse(event.data);
          if (payload.error) {
            output.textContent += `\n[错误] ${payload.error}`;
            es.close();
            btn.disabled = false;
            status.textContent = "出错";
            return;
          }
          // 追加增量文本，实现逐字显示效果
          output.textContent += payload.delta;
        } catch (e) {
          output.textContent += event.data;
        }
      };

      es.onerror = () => {
        // SSE 断开时触发（包括服务端主动关闭连接）
        // 如果已完成（[DONE] 已收到），这里的 error 可以忽略
        es.close();
        btn.disabled = false;
        if (status.textContent !== "完成") {
          status.textContent = "连接断开";
        }
      };
    }

    // ─────────────────────────────────────────
    // 普通 POST 接口（对照：等全部回复后一次显示）
    // ─────────────────────────────────────────
    async function sendNormal() {
      const sessionId = document.getElementById("session").value.trim();
      const message   = document.getElementById("msg").value.trim();
      if (!message) return;

      const output = document.getElementById("output");
      const status = document.getElementById("status");

      output.textContent = "等待回复中（非流式，需等 AI 全部生成完毕）…";
      status.textContent = "请求中…";

      const res  = await fetch(`${BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message }),
      });
      const data = await res.json();

      output.textContent = data.reply ?? data.error ?? JSON.stringify(data);
      status.textContent = "完成（普通接口）";
    }

    // ─────────────────────────────────────────
    // 清除会话历史
    // ─────────────────────────────────────────
    async function clearSession() {
      const sessionId = document.getElementById("session").value.trim();
      await fetch(`${BASE}/chat/${encodeURIComponent(sessionId)}`, { method: "DELETE" });
      document.getElementById("output").textContent = "";
      document.getElementById("status").textContent = "会话已清除";
    }
  </script>
</body>
</html>
